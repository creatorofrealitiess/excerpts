<style>
:root {
  --white:#fff;--bg:#f6f5f1;--bg-warm:#f0eeea;--bg-card:#fff;--bg-hover:#faf9f7;
  --border:#e8e6e1;--border-lt:#f0eeea;--txt:#1a1815;--txt2:#6b6660;--txt3:#a09a93;--txtW:#fff;
  --accent:#e85d3a;--accent-h:#d44e2d;--accent-lt:#fef0ec;
  --draft:#e5a832;--draft-bg:#fdf6e8;--ready:#2da562;--ready-bg:#edf7f1;--posted:#6366f1;--posted-bg:#eef0fe;
  --re:#e85d3a;--dk:#6366f1;--pv:#d946a8;
  --sh-s:0 1px 2px rgba(26,24,21,.04);--sh-m:0 4px 12px rgba(26,24,21,.06);--sh-l:0 8px 30px rgba(26,24,21,.08);--sh-h:0 8px 24px rgba(26,24,21,.1);
  --r-s:8px;--r-m:12px;--r-l:16px;
  --tr:all .2s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* AUTH */
.auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:1000}
.auth-box{width:90%;max-width:380px;animation:su .5s ease}
@keyframes su{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.auth-brand{text-align:center;margin-bottom:36px}
.auth-brand h1{font-family:'Fraunces',serif;font-weight:800;font-size:2rem;color:var(--txt);letter-spacing:-.5px}
.auth-brand h1 span{color:var(--accent)}
.auth-brand p{color:var(--txt2);font-size:.85rem;margin-top:4px}
.auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-l);padding:28px;box-shadow:var(--sh-m)}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:.75rem;font-weight:600;color:var(--txt2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.auth-field input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-s);font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--txt);background:var(--white);outline:none;transition:var(--tr)}
.auth-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt)}
.auth-submit{width:100%;padding:13px;background:var(--accent);color:var(--txtW);border:none;border-radius:var(--r-s);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:var(--tr);margin-top:6px}
.auth-submit:hover{background:var(--accent-h)}
.auth-switch{text-align:center;margin-top:18px;font-size:.85rem;color:var(--txt2)}
.auth-switch a{color:var(--accent);font-weight:600;cursor:pointer;text-decoration:none}
.auth-error{color:#dc3545;font-size:.82rem;text-align:center;margin-top:12px;min-height:18px}

/* APP */
.app{display:none}.app.active{display:flex;flex-direction:column;min-height:100vh}

/* NAV */
.navbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-back{display:none;width:34px;height:34px;border-radius:var(--r-s);border:1px solid var(--border);background:var(--white);color:var(--txt2);cursor:pointer;align-items:center;justify-content:center;font-size:1.1rem;transition:var(--tr)}
.nav-back:hover{background:var(--bg)}
.nav-brand{font-family:'Fraunces',serif;font-weight:700;font-size:1.15rem;color:var(--txt)}
.nav-brand span{color:var(--accent)}
.nav-sub{font-size:.7rem;color:var(--txt3);font-weight:400;display:block;font-family:'DM Sans',sans-serif;letter-spacing:.3px}
.nav-title{display:none;font-weight:600;font-size:.95rem;color:var(--txt)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-btn{width:34px;height:34px;border-radius:var(--r-s);border:1px solid var(--border);background:var(--white);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:var(--tr)}
.nav-btn:hover{background:var(--bg);color:var(--txt)}

/* BOTTOM TABS */
.btabs{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-i{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;cursor:pointer;transition:var(--tr);gap:3px;-webkit-tap-highlight-color:transparent}
.tab-ic{font-size:1.3rem;line-height:1}.tab-lb{font-size:.65rem;font-weight:500;color:var(--txt3);letter-spacing:.3px}
.tab-i.active .tab-lb{color:var(--accent);font-weight:600}
.tab-i:not(.active) .tab-ic{opacity:.45}

/* PAGES */
.page{display:none;padding:20px;padding-bottom:90px}.page.active{display:block}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-t{font-family:'Fraunces',serif;font-weight:700;font-size:1.5rem}
.sec-st{font-size:.85rem;color:var(--txt2);margin-top:2px}

/* ACCOUNTS */
.acc-grp{margin-bottom:24px}
.grp-lb{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-left:2px}
.grp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.grp-nm{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txt3)}
.acc-list{display:flex;flex-direction:column;gap:8px}
.acc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-m);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:var(--tr);box-shadow:var(--sh-s)}
.acc-card:hover{box-shadow:var(--sh-h);transform:translateY(-1px)}
.acc-av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:.85rem;color:var(--txtW);flex-shrink:0;overflow:hidden;background-size:cover;background-position:center}
.acc-av img{width:100%;height:100%;object-fit:cover}
.acc-info{flex:1;min-width:0}.acc-handle{font-weight:600;font-size:.92rem}
.acc-counts{display:flex;gap:6px;margin-top:5px}
.cnt-pill{font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:20px}
.cnt-pill.draft{background:var(--draft-bg);color:var(--draft)}.cnt-pill.ready{background:var(--ready-bg);color:var(--ready)}.cnt-pill.posted{background:var(--posted-bg);color:var(--posted)}
.acc-arrow{color:var(--txt3);font-size:1.1rem;flex-shrink:0}
/* PFP upload */
.pfp-upload{position:relative;cursor:pointer}
.pfp-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.auth-big-av.editable{cursor:pointer;position:relative;transition:var(--tr)}
.auth-big-av.editable:hover{opacity:.8}
.auth-big-av.editable::after{content:'&#9998;';position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:var(--accent);color:white;font-size:.6rem;display:flex;align-items:center;justify-content:center;border:2px solid var(--white)}
.pfp-edit-wrap{position:relative;cursor:pointer}
.pfp-edit-badge{position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:var(--accent);color:white;font-size:.6rem;display:flex;align-items:center;justify-content:center;border:2px solid var(--white)}

/* CALENDAR */
.cal-filter{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.cal-chip{padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:500;white-space:nowrap;cursor:pointer;transition:var(--tr);border:1px solid var(--border);background:var(--white);color:var(--txt2)}
.cal-chip.active{background:var(--txt);color:var(--txtW);border-color:var(--txt)}
.cal-chip:hover:not(.active){background:var(--bg)}
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-nb{width:32px;height:32px;border-radius:var(--r-s);border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--txt2);transition:var(--tr)}
.cal-nb:hover{background:var(--bg)}
.cal-mo{font-family:'Fraunces',serif;font-weight:700;font-size:1.1rem}
.cal-today{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;color:var(--txt2);cursor:pointer;transition:var(--tr)}
.cal-today:hover{background:var(--bg)}
.cal-grid{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-m);overflow:hidden;box-shadow:var(--sh-s)}
.cal-wk{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.cal-wd{padding:10px 4px;text-align:center;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3)}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:80px;padding:5px;border-right:1px solid var(--border-lt);border-bottom:1px solid var(--border-lt);cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover{background:var(--bg-hover)}
.cal-dn{font-size:.76rem;font-weight:500;color:var(--txt2);margin-bottom:3px}
.cal-day.today .cal-dn{background:var(--accent);color:var(--txtW);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem}
.cal-day.oth{opacity:.3}
/* Calendar post items */
.cal-item{display:flex;align-items:center;gap:3px;padding:2px 4px;border-radius:4px;margin-bottom:2px;font-size:.62rem;font-weight:600;cursor:pointer;transition:var(--tr);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-item:hover{opacity:.8}
.cal-item.proj-re{background:rgba(232,93,58,.12);color:var(--re)}
.cal-item.proj-dk{background:rgba(99,102,241,.12);color:var(--dk)}
.cal-item.proj-pv{background:rgba(217,70,168,.12);color:var(--pv)}
.cal-thumb{width:16px;height:16px;border-radius:3px;object-fit:cover;flex-shrink:0}
.cal-legend{display:flex;gap:16px;margin-top:14px;padding-left:4px;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--txt3)}
.leg-d{width:7px;height:7px;border-radius:50%}

/* TASKS */
.task-cat{margin-bottom:24px}
.task-cat-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 4px;cursor:pointer;transition:var(--tr);user-select:none}
.task-cat-hd:hover{background:var(--bg-hover)}
.task-cat-title{font-family:'Fraunces',serif;font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px}
.task-cat-count{font-size:.72rem;font-weight:600;color:var(--txt3);background:var(--bg);padding:2px 8px;border-radius:10px}
.task-cat-arr{font-size:.8rem;color:var(--txt3);transition:var(--tr)}
.task-cat-hd.open .task-cat-arr{transform:rotate(180deg)}
.task-cat-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.task-cat-body.open{max-height:3000px}
/* Sub-category */
.task-sub{margin-bottom:10px;border-radius:var(--r-m);border:1px solid var(--border);background:var(--bg-card);overflow:hidden;box-shadow:var(--sh-s)}
.task-sub:last-of-type{margin-bottom:4px}
.task-sub-hd{display:flex;align-items:center;gap:8px;padding:10px 16px 10px 14px;cursor:pointer;transition:var(--tr);user-select:none}
.task-sub-hd:hover{background:var(--bg-hover)}
.task-sub-hd.proj-re{background:rgba(232,93,58,.06);border-bottom:1px solid rgba(232,93,58,.1)}
.task-sub-hd.proj-dk{background:rgba(99,102,241,.06);border-bottom:1px solid rgba(99,102,241,.1)}
.task-sub-hd.proj-pv{background:rgba(217,70,168,.06);border-bottom:1px solid rgba(217,70,168,.1)}
.task-sub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.task-sub-nm{font-size:.78rem;font-weight:600;color:var(--txt2)}
.task-sub-arr{font-size:.7rem;color:var(--txt3);transition:var(--tr);margin-left:auto}
.task-sub-hd.open .task-sub-arr{transform:rotate(180deg)}
.task-sub-add{display:none}
.task-add{display:none}
/* Task modal */
.task-modal-overlay{position:fixed;inset:0;background:rgba(26,24,21,.4);z-index:200;display:none;align-items:flex-end;justify-content:center}
.task-modal-overlay.show{display:flex}
.task-modal{width:100%;max-width:500px;background:var(--bg-card);border-radius:var(--r-l) var(--r-l) 0 0;padding:24px 20px 28px;box-shadow:0 -8px 40px rgba(0,0,0,.15);animation:modalUp .25s ease}
@keyframes modalUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.task-modal h3{font-family:'Fraunces',serif;font-weight:700;font-size:1.1rem;margin-bottom:18px}
.task-modal-field{margin-bottom:14px}
.task-modal-field label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);margin-bottom:6px}
.task-modal-field input,.task-modal-field select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-s);font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--txt);background:var(--white);outline:none;transition:var(--tr)}
.task-modal-field input:focus,.task-modal-field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt)}
.task-modal-row{display:flex;gap:10px}
.task-modal-row>*{flex:1}
.task-modal-actions{display:flex;gap:8px;margin-top:18px}
.task-modal-actions button{flex:1;padding:13px;border-radius:var(--r-s);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--tr);border:none}
.task-modal-cancel{background:var(--bg);color:var(--txt2)}
.task-modal-cancel:hover{background:var(--border)}
.task-modal-save{background:var(--accent);color:var(--txtW)}
.task-modal-save:hover{background:var(--accent-h)}
/* Tap zone */
.task-tap-zone{padding:10px;text-align:center;cursor:pointer;color:var(--txt3);font-size:.72rem;border-radius:var(--r-s);transition:var(--tr)}
.task-tap-zone:hover{background:var(--bg-hover);color:var(--txt2)}
.task-sub-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.task-sub-body.open{max-height:2000px}
/* Task items */
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 16px 10px 32px;border-top:1px solid var(--border-lt);transition:var(--tr)}
.task-item:hover{background:var(--bg-hover)}
.task-chk{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:1px;transition:var(--tr);display:flex;align-items:center;justify-content:center;background:var(--white)}
.task-chk:hover{border-color:var(--accent)}
.task-chk.done{background:var(--accent);border-color:var(--accent);color:white;font-size:.65rem}
.task-body{flex:1;min-width:0}
.task-txt{font-size:.88rem;line-height:1.4}
.task-item.done .task-txt{text-decoration:line-through;color:var(--txt3)}
.task-due{font-size:.7rem;font-weight:500;margin-top:3px;display:inline-block;padding:1px 6px;border-radius:4px}
.task-due.overdue{background:#fde8e8;color:#dc3545}
.task-due.today-due{background:var(--ready-bg);color:var(--ready)}
.task-due.future{color:var(--txt3)}
.task-del{color:var(--txt3);cursor:pointer;font-size:.9rem;opacity:0;transition:var(--tr);flex-shrink:0;padding:2px}
.task-item:hover .task-del{opacity:1}
.task-del:hover{color:#dc3545}
/* Completed section under category */
.task-completed-hd{padding:12px 16px;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-m);margin-top:10px}
.task-completed-hd:hover{background:var(--bg-hover)}
.task-completed-body{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--bg-card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r-m) var(--r-m);margin-top:-1px}
.task-completed-body.open{max-height:2000px}
/* Add task row */
.task-add{display:none;gap:8px;padding:10px 14px;border-top:1px solid var(--border-lt);align-items:center;background:var(--bg-hover)}
.task-add.show{display:flex}
.task-add-in{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-s);font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--txt);background:var(--white);outline:none;transition:var(--tr)}
.task-add-in:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt)}
.task-add-date{padding:8px 8px;border:1.5px solid var(--border);border-radius:var(--r-s);font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--txt);background:var(--white);outline:none;width:120px}
.task-add-btn{padding:8px 14px;border-radius:var(--r-s);background:var(--accent);color:var(--txtW);border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.8rem;cursor:pointer;transition:var(--tr);white-space:nowrap}
.task-add-btn:hover{background:var(--accent-h)}

/* AUTHOR VIEW */
.auth-banner{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-m);box-shadow:var(--sh-s)}
.auth-big-av{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:1.1rem;color:var(--txtW);overflow:hidden;background-size:cover;background-position:center}
.auth-big-av img{width:100%;height:100%;object-fit:cover}
.auth-b-info h2{font-family:'Fraunces',serif;font-weight:700;font-size:1.15rem}
.auth-b-info p{font-size:.82rem;color:var(--txt2);margin-top:2px}
.filt-row{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filt-p{padding:7px 16px;border-radius:20px;font-size:.8rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:var(--tr);border:1px solid var(--border);background:var(--white);color:var(--txt2)}
.filt-p.active{background:var(--txt);color:var(--txtW);border-color:var(--txt)}
.filt-p:hover:not(.active){background:var(--bg)}

/* POST CARDS — 2 column grid */
.post-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.p-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-s);cursor:pointer;transition:var(--tr);box-shadow:var(--sh-s);overflow:hidden;display:flex;flex-direction:column}
.p-card:hover{box-shadow:var(--sh-h);transform:translateY(-2px)}
.p-card-img{width:100%;aspect-ratio:1;background:var(--bg-warm);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.p-card-img img{width:100%;height:100%;object-fit:cover}
.p-card-img .no-img{font-size:1.4rem;opacity:.25}
.p-card-status{position:absolute;top:5px;right:5px;padding:2px 6px;border-radius:10px;font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.2px}
.p-card-status.draft{background:var(--draft-bg);color:var(--draft)}.p-card-status.ready{background:var(--ready-bg);color:var(--ready)}.p-card-status.posted{background:var(--posted-bg);color:var(--posted)}
.p-card-body{padding:7px 8px}
.p-card-hook{font-weight:600;font-size:.72rem;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:2px}
.p-card-meta{font-size:.62rem;color:var(--txt3)}

/* FAB */
.fab{position:fixed;bottom:78px;right:18px;width:52px;height:52px;border-radius:16px;background:var(--accent);border:none;color:white;font-size:1.5rem;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(232,93,58,.35);transition:var(--tr);z-index:50}
.fab:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,93,58,.45)}
.fab.show{display:flex}

/* EDITOR */
.ed-page{display:none;padding:16px 20px 100px}.ed-page.active{display:block}
.ed-sec{margin-bottom:22px}
.ed-lb{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ed-row{display:flex;align-items:center;justify-content:space-between}
.ed-in,.ed-ta{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-s);font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--txt);background:var(--white);outline:none;transition:var(--tr);resize:none}
.ed-in:focus,.ed-ta:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt)}
.ed-ta{min-height:80px;line-height:1.6}.ed-ta.sm{min-height:56px}.ed-ta.lg{min-height:180px}
.dropzone{border:2px dashed var(--border);border-radius:var(--r-m);padding:28px 16px;text-align:center;cursor:pointer;transition:var(--tr);background:var(--bg-hover)}
.dropzone:hover,.dropzone.over{border-color:var(--accent);background:var(--accent-lt)}
.dz-icon{font-size:1.6rem;margin-bottom:6px}.dz-txt{font-size:.82rem;color:var(--txt2)}.dz-txt b{color:var(--accent)}
.img-gal{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.img-it{position:relative;width:110px;height:110px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.img-it img{width:100%;height:100%;object-fit:cover}
.img-rm{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.6);color:white;border:none;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-sv{position:absolute;bottom:4px;right:4px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.6);color:white;border:none;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cp-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--white);color:var(--txt2);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;transition:var(--tr)}
.cp-btn:hover{background:var(--bg);color:var(--txt)}.cp-btn.copied{background:var(--ready-bg);color:var(--ready);border-color:var(--ready)}
.tag-bank{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tag-c{padding:4px 10px;border-radius:16px;font-size:.72rem;font-weight:500;cursor:pointer;transition:var(--tr);border:1px solid var(--border);background:var(--white);color:var(--txt2)}
.tag-c:hover{border-color:var(--accent);color:var(--accent)}.tag-c.active{background:var(--accent-lt);color:var(--accent);border-color:var(--accent)}
.cp-all{width:100%;padding:12px;border-radius:var(--r-s);background:var(--txt);color:var(--txtW);border:none;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--tr)}
.cp-all:hover{opacity:.9}
.st-pick{display:flex;gap:8px}
.st-opt{flex:1;padding:10px;border-radius:var(--r-s);border:1.5px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;text-align:center;cursor:pointer;transition:var(--tr);color:var(--txt2)}
.st-opt:hover{border-color:#ccc}
.st-opt.active[data-s="draft"]{border-color:var(--draft);color:var(--draft);background:var(--draft-bg)}
.st-opt.active[data-s="ready"]{border-color:var(--ready);color:var(--ready);background:var(--ready-bg)}
.st-opt.active[data-s="posted"]{border-color:var(--posted);color:var(--posted);background:var(--posted-bg)}
.sch-row{display:flex;gap:8px}.sch-row input{flex:1}
.col-hd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 0}
.col-hd .arr{font-size:.8rem;color:var(--txt3);transition:var(--tr)}.col-hd.open .arr{transform:rotate(180deg)}
.col-bd{max-height:0;overflow:hidden;transition:max-height .3s ease}.col-bd.open{max-height:400px}
.save-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0));background:var(--white);border-top:1px solid var(--border);display:flex;gap:8px;z-index:100}
.sv-btn{flex:1;padding:12px;border-radius:var(--r-s);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--tr);border:none}
.sv-btn.pri{background:var(--accent);color:white}.sv-btn.pri:hover{background:var(--accent-h)}
.sv-btn.out{background:var(--white);color:#dc3545;border:1px solid #f5c6cb}.sv-btn.out:hover{background:#fff5f5}
.empty{text-align:center;padding:50px 20px}.empty-ic{font-size:2.2rem;margin-bottom:10px}.empty-t{font-weight:600;color:var(--txt2);margin-bottom:4px}.empty-s{font-size:.84rem;color:var(--txt3)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--txt);color:var(--txtW);padding:10px 22px;border-radius:var(--r-m);font-size:.85rem;font-weight:500;box-shadow:var(--sh-l);opacity:0;transition:all .35s ease;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .5s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@media(max-width:400px){.post-grid{grid-template-columns:repeat(2,1fr)}.cal-day{min-height:60px}}
</style>
</head>
<body>

<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-brand"><h1>BookTok <span>Studio</span></h1><p>TikTok Post Manager</p></div>
    <div class="auth-card">
      <div class="auth-field"><label>Email</label><input type="email" id="authEmail" placeholder="you@email.com" autocomplete="email"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="authPass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="auth-submit" id="authBtn" onclick="handleAuth()">Sign In</button>
      <div class="auth-switch" id="authSw">No account? <a onclick="togAuth()">Create one</a></div>
      <div class="auth-error" id="authErr"></div>
    </div>
  </div>
</div>

<div class="app" id="app">
  <div class="navbar">

// CALENDAR
function renderCal(){const el=document.getElementById('pgCal');const mos=['January','February','March','April','May','June','July','August','September','October','November','December'];const dys=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const sched=[];for(const[aid,posts]of Object.entries(allPosts)){const a=AUTHORS.find(x=>x.id===aid);if(!a)continue;for(const[pid,p]of Object.entries(posts)){if(p.scheduledDate)sched.push({...p,authorId:aid,pid,authorName:a.name,project:a.project})}}
const fd=new Date(calYr,calMo,1).getDay(),dim=new Date(calYr,calMo+1,0).getDate(),pd=new Date(calYr,calMo,0).getDate(),today=new Date();
let fh=`<div class="cal-filter"><div class="cal-chip ${calFilt==='all'?'active':''}" onclick="setCF('all')">All</div>`;AUTHORS.forEach(a=>{fh+=`<div class="cal-chip ${calFilt===a.id?'active':''}" onclick="setCF('${a.id}')">${a.name}</div>`});fh+='</div>';
let cdh='',dc=1,nc=1;const tc=Math.ceil((fd+dim)/7)*7;
for(let i=0;i<tc;i++){let dn,oth=false,ds='';if(i<fd){dn=pd-fd+i+1;oth=true;const pm=calMo===0?11:calMo-1,py=calMo===0?calYr-1:calYr;ds=`${py}-${String(pm+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`}else if(dc>dim){dn=nc++;oth=true;const nm=calMo===11?0:calMo+1,ny=calMo===11?calYr+1:calYr;ds=`${ny}-${String(nm+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`}else{dn=dc++;ds=`${calYr}-${String(calMo+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`}
const ist=!oth&&dn===today.getDate()&&calMo===today.getMonth()&&calYr===today.getFullYear();
const dp=sched.filter(p=>p.scheduledDate===ds&&(calFilt==='all'||p.authorId===calFilt));
let itemsH='';
if(calFilt==='all'){dp.forEach(p=>{itemsH+=`<div class="cal-item proj-${p.project.toLowerCase()}" onclick="event.stopPropagation();showEd('${p.pid}','${p.authorId}')">${p.authorName}</div>`})}else{dp.forEach(p=>{const thumb=p.images&&p.images[0]?`<img class="cal-thumb" src="${p.images[0]}" alt="">`:''
itemsH+=`<div class="cal-item proj-${p.project.toLowerCase()}" onclick="event.stopPropagation();showEd('${p.pid}','${p.authorId}')">${thumb}<span style="overflow:hidden;text-overflow:ellipsis">${esc(p.hook||'Post')}</span></div>`})}
cdh+=`<div class="cal-day ${oth?'oth':''} ${ist?'today':''}"><div class="cal-dn">${dn}</div>${itemsH}</div>`}
el.innerHTML=`<div class="sec-hd"><div class="sec-t">Calendar</div></div>${fh}<div class="cal-hd"><div class="cal-nav"><button class="cal-nb" onclick="chMo(-1)">&#8249;</button><div class="cal-mo">${mos[calMo]} ${calYr}</div><button class="cal-nb" onclick="chMo(1)">&#8250;</button></div><button class="cal-today" onclick="goTd()">Today</button></div><div class="cal-grid"><div class="cal-wk">${dys.map(d=>`<div class="cal-wd">${d}</div>`).join('')}</div><div class="cal-days">${cdh}</div></div><div class="cal-legend"><div class="leg-i"><div class="leg-d" style="background:var(--re)"></div>RE</div><div class="leg-i"><div class="leg-d" style="background:var(--dk)"></div>DK</div><div class="leg-i"><div class="leg-d" style="background:var(--pv)"></div>PV</div></div>`}
function chMo(d){calMo+=d;if(calMo>11){calMo=0;calYr++}if(calMo<0){calMo=11;calYr--}renderCal()}
function goTd(){const t=new Date();calMo=t.getMonth();calYr=t.getFullYear();renderCal()}

function renderTasks(){const el=document.getElementById('pgTask');const todayStr=new Date().toISOString().split('T')[0];
let h=`<div class="sec-hd"><div><div class="sec-t">Tasks</div><div class="sec-st">${tasks.filter(t=>!t.done).length} pending</div></div></div>`;

TASK_CATS.forEach(cat=>{const catTasks=tasks.filter(t=>t.category===cat);const pending=catTasks.filter(t=>!t.done);const done=catTasks.filter(t=>t.done);
h+=`<div class="task-cat"><div class="task-cat-hd open" onclick="togCat(this)"><div class="task-cat-title">${cat} <span class="task-cat-count">${pending.length}</span></div><div class="task-cat-arr">&#9660;</div></div><div class="task-cat-body open">`;

PROJ_KEYS.forEach(pk=>{const subTasks=pending.filter(t=>t.project===pk);

<div class="ed-sec"><button class="cp-all" onclick="cpAll()">&#128203; Copy All</button></div>
<div class="ed-sec"><div class="ed-lb">&#128197; Schedule</div><div class="sch-row"><input class="ed-in" type="date" id="schD" value="${p.scheduledDate||''}"><input class="ed-in" type="time" id="schT" value="${p.scheduledTime||''}"></div></div>
<div class="ed-sec"><div class="ed-lb">Status</div><div class="st-pick"><div class="st-opt ${selStatus==='draft'?'active':''}" data-s="draft" onclick="pSt(this,'draft')">Draft</div><div class="st-opt ${selStatus==='ready'?'active':''}" data-s="ready" onclick="pSt(this,'ready')">Ready</div><div class="st-opt ${selStatus==='posted'?'active':''}" data-s="posted" onclick="pSt(this,'posted')">Posted</div></div></div>
<div class="ed-sec"><div class="col-hd" onclick="togCol(this)"><div class="ed-lb" style="margin:0">&#128221; Notes</div><span class="arr">&#9660;</span></div><div class="col-bd"><textarea class="ed-ta sm" id="notI" placeholder="Internal notes...">${esc(p.notes||'')}</textarea></div></div>
<div class="ed-sec"><div class="col-hd" onclick="togCol(this)"><div class="ed-lb" style="margin:0">&#128218; Context</div><span class="arr">&#9660;</span></div><div class="col-bd"><textarea class="ed-ta sm" id="ctxI" placeholder="Book title, tropes...">${esc(p.context||'')}</textarea></div></div>
<div style="height:70px"></div><div class="save-bar">${curPostId?'<button class="sv-btn out" onclick="delPost()">Delete</button>':''}<button class="sv-btn pri" onclick="savePost()">Save</button></div>`;setupDrop();setupPaste()}

function imgH(s,i){return`<div class="img-it"><img src="${s}" alt=""><button class="img-sv" onclick="event.stopPropagation();dlI(${i})" title="Save">&#8595;</button><button class="img-rm" onclick="event.stopPropagation();rmI(${i})" title="Remove">&#10005;</button></div>`}
function refG(){const g=document.getElementById('imgG');if(g)g.innerHTML=edImgs.map((img,i)=>imgH(img,i)).join('')}
async function hFiles(fs){for(const f of fs){if(!f.type.startsWith('image/'))continue;edImgs.push(await toDataUrl(f))}refG()}
function toDataUrl(f){return new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.readAsDataURL(f)})}
function rmI(i){edImgs.splice(i,1);refG()}
function dlI(i){window.open(edImgs[i],'_blank')}
function setupDrop(){const z=document.getElementById('dz');if(!z)return;z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('over')});z.addEventListener('dragleave',()=>z.classList.remove('over'));z.addEventListener('drop',async e=>{e.preventDefault();z.classList.remove('over');await hFiles(e.dataTransfer.files)})}
function setupPaste(){document.onpaste=async e=>{const items=e.clipboardData?.items;if(!items)return;for(const it of items){if(it.type.startsWith('image/')){e.preventDefault();edImgs.push(await toDataUrl(it.getAsFile()));refG()}}}}
function togTag(c,t){const inp=document.getElementById('tagI');const cur=inp.value.trim().split(/\s+/).filter(t=>t.startsWith('#'));if(cur.includes(t)){inp.value=cur.filter(x=>x!==t).join(' ');c.classList.remove('active')}else{inp.value=(inp.value.trim()?inp.value.trim()+' ':'')+t;c.classList.add('active')}}
function pSt(el,s){selStatus=s;document.querySelectorAll('.st-opt').forEach(o=>o.classList.remove('active'));el.classList.add('active')}
function togCol(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open')}
function cpF(id,btn){const el=document.getElementById(id);if(!el)return;navigator.clipboard.writeText(el.value).then(()=>{btn.classList.add('copied');btn.textContent='Copied!';setTimeout(()=>{btn.classList.remove('copied');btn.textContent='Copy'},1500)})}
function cpAll(){const h=document.getElementById('hookI')?.value||'',s=document.getElementById('slideI')?.value||'',c=document.getElementById('capI')?.value||'',t=document.getElementById('tagI')?.value||'';navigator.clipboard.writeText([h,s,c,t].filter(Boolean).join('\n\n')).then(()=>toast('Copied all fields'))}
async function savePost(){if(!user||!curAuthor)return;const d={hook:document.getElementById('hookI')?.value||'',slideshowTitle:document.getElementById('slideI')?.value||'',caption:document.getElementById('capI')?.value||'',hashtags:document.getElementById('tagI')?.value||'',scheduledDate:document.getElementById('schD')?.value||'',scheduledTime:document.getElementById('schT')?.value||'',status:selStatus,notes:document.getElementById('notI')?.value||'',context:document.getElementById('ctxI')?.value||'',images:edImgs,updatedAt:Date.now()};const pid=curPostId||db.ref().push().key;try{await db.ref(`users/${user.uid}/posts/${curAuthor.id}/${pid}`).set(d);postsCache[pid]=d;curPostId=pid;toast('Saved!')}catch(e){toast('Error: '+e.message)}}
async function delPost(){if(!user||!curAuthor||!curPostId)return;if(!confirm('Delete this post?'))return;try{await db.ref(`users/${user.uid}/posts/${curAuthor.id}/${curPostId}`).remove();delete postsCache[curPostId];toast('Deleted');goBack()}catch(e){toast('Error: '+e.message)}}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
</script>
</body>
</html>
