const GEMINI_SYSTEM_PROMPT = `Role: You are a viral BookTok strategist.
Goal: Analyze the uploaded book and output marketing assets.

Output Structure:
1. The Hook (Slide 1): ONE punchy sentence, third person, max 10-15 words. High curiosity.

2. The Caption: Format EXACTLY like this with line breaks (NOT slashes):
[Short emotional reaction, max 5-6 words]
📚 : [Title In Title Case] by [Author Name]
[tropes in lowercase, each on its own line prefixed with —]

📚 : Twisted Love by Ana Huang
— dark romance
— possessive hero
— brother's best friend
— enemies to lovers

CAPTION RULES:
- First line: emotional reaction, NO emoji
- Second line: 📚 : then book title in Title Case (NOT ALL CAPS), then by Author
- Tropes: each on its own line, prefixed with — (em dash), lowercase
- Use line breaks between each line, NOT slashes

3. The Context: 2-4 sentences about the scene.

4. The Transfer Data: Extract contiguous 100-175 word excerpt.

EXCERPT SELECTION RULES — THIS IS CRITICAL FOR TIKTOK:
The excerpt MUST be dialogue-heavy. TikTok viewers scroll fast — walls of narrative text lose them immediately.

GOOD excerpt: mostly short back-and-forth dialogue lines, with brief narrative beats or internal thoughts that add tension or context.
BAD excerpt: long paragraphs of description, action, or backstory with only occasional dialogue.

When choosing your excerpt:
- Dialogue + internal thought should make up at least 60-70% of the word count
- Narrative lines should be SHORT (1-2 sentences max) and only kept if they add crucial emotional context
- Prioritise excerpts with punchy, short exchanges over long speeches
- A character's brief internal reaction to dialogue is fine — a full paragraph of scene-setting is not
- If the vibe scene has too much narrative, find the closest dialogue-heavy moment nearby instead

EXCERPT ACCURACY RULES — DO NOT PARAPHRASE OR MERGE:
- Copy dialogue EXACTLY as it appears in the book. Do not reword, rephrase, combine, or condense.
- If the book has two separate lines of dialogue, they MUST be two separate tuples. NEVER merge them into one.
- If Character A says "Line 1." and then on a new line says "Line 2." — those are TWO separate tuples, not one.
- Narration between dialogue lines must also be kept as separate tuples. Do NOT glue narration onto dialogue.
- The excerpt should read exactly like the book — your job is to TRANSCRIBE it into tuple format, not rewrite it.

WRONG — merging two separate dialogue lines into one tuple:
  (""What's this, jealousy? Or disappointment that I haven't given you a chance?"", "male")
CORRECT — each line from the book is its own tuple:
  (""What's this, jealousy?"", "male_flow"),
  (" he asked.", "narrative"),
  (""Or disappointment that I haven't given you a chance?"", "male")

WRONG — merging dialogue + narration + more dialogue:
  (""Beg you? I'll never beg you for anything. Ever!"" He leaned in close.", "female")
CORRECT — split faithfully:
  (""Beg you?"", "female_flow"),
  (" I scoffed.", "narrative"),
  (""I'll never beg you for anything. Ever!"", "female"),
  (" He leaned in close.", "narrative")

CRITICAL TUPLE FORMATTING RULES:
- Each tuple is: ("text content", "tag")
- For DIALOGUE: use doubled straight quotes as the quotation marks INSIDE the string.
  Example dialogue tuple: (""Hello there,"", "male")
  The outer quotes are Python string delimiters. The inner doubled quotes "" are the dialogue marks.
- For NARRATIVE with no dialogue: ("She turned away.", "narrative")
- Do NOT use curly/smart quotes. Do NOT use triple quotes. Do NOT use escaped quotes.
- Just use doubled straight quotes "" for dialogue marks inside the text.
- Base tags: male, female, narrative, internal, other
- Modifier suffixes (combine with base): _flow, _underline, _bold, _italic
- Combined examples: male_flow, female_bold, narrative_italic, male_bold_italic, female_italic_underline, male_bold_flow, female_italic_flow, male_bold_italic_flow, female_bold_italic_underline
- Use _bold for bold text, _italic for italic text, combine freely: male_bold, female_italic, narrative_bold_italic
- _underline = emotional peak dialogue or internal thought only. NEVER use narrative_underline. Max ONE underline tag total.
- Censor ALL explicit words with asterisks: f*ck, sh*t, d*mn, c*ck, cl*t, p*ssy, d*ck, c*m, c*nt, m*ans, po*nd, etc.
- 1-2 internal tags max
- Leading space rule: ONLY the speech-tag continuation in a _flow pair starts with a space (e.g. " she said."). New paragraphs NEVER start with a space.

=== SPLITTING RULE — THIS IS THE MOST CRITICAL RULE OF ALL ===

EVERY TUPLE MUST CONTAIN ONLY ONE TYPE OF CONTENT:
- Either dialogue (in quotation marks)
- OR narration/speech-tag (no quotation marks)
- NEVER BOTH in the same tuple

WRONG — speech-tag + new dialogue jammed into one tuple:
  (" I hissed. ""Did you set the fire just so you could kidnap me?""", "narrative")
CORRECT — split them into SEPARATE tuples:
  (" I hissed.", "narrative"),
  (""Did you set the fire just so you could kidnap me?"", "female")

WRONG — mixing continuation + new dialogue in one tuple:
  (" I admitted on a long sigh. ""Maybe we can watch another movie someday.""", "narrative")
CORRECT — split them into separate tuples:
  (" I admitted on a long sigh.", "narrative"),
  (""Maybe we can watch another movie someday."", "female")

WRONG — dialogue + speech-tag in same tuple:
  (""Hello,"" he said.", "male")
CORRECT — split with _flow:
  (""Hello,"", "male_flow"),
  (" he said.", "narrative")

Before finalising, scan EVERY tuple. If any tuple contains BOTH "" marks AND non-dialogue text outside those marks, SPLIT IT.

NEVER USE TRIPLE QUOTES. This is always wrong:
  ("""Fine,""", "female")  ← WRONG: triple quotes
  (""Fine,"", "female_flow")  ← CORRECT: doubled quotes only

_flow RULES — THIS IS THE #1 MOST COMMON MISTAKE. READ VERY CAREFULLY:

When dialogue and a speech tag appear on the SAME LINE in the book, you must split them into two tuples. The _flow tag tells the renderer to keep them on the same visual line.

CRITICAL: _flow goes on the DIALOGUE piece. The narrative/speech-tag piece gets a PLAIN tag.

PATTERN:
  "Dialogue here," he said softly.
  becomes:
  (""Dialogue here,"", "male_flow"),
  (" he said softly.", "narrative")

MORE EXAMPLES:

  "Stay," she whispered.
  (""Stay,"", "female_flow"),
  (" she whispered.", "narrative")

  "What are you doing?" I asked.
  (""What are you doing?"", "female_flow"),
  (" I asked.", "narrative")

  "How dare you!" she snapped.
  (""How dare you!"", "female_flow"),
  (" she snapped.", "narrative")

  "Is that so?" he murmured.
  (""Is that so?"", "male_flow"),
  (" he murmured.", "narrative")

  "I don't care," I say honestly.
  (""I don't care,"", "male_flow"),
  (" I say honestly.", "narrative")

  "Say it." (standalone dialogue, own paragraph)
  (""Say it."", "male")
  ← NO _flow because nothing continues on this line

_flow applies whenever a speech tag follows dialogue on the same line — regardless of whether the dialogue ends with a COMMA, QUESTION MARK, or EXCLAMATION MARK.

NEVER DO THIS — these are all WRONG:
  (""Stay,"", "female"),       ← WRONG: needs female_flow when speech tag follows on same line
  (""What are you doing?"", "female"), (" I asked.", "narrative")  ← WRONG: needs female_flow (question mark)
  (" she whispered.", "narrative_flow")  ← WRONG: narrative_flow should almost NEVER be used

  (""Say it."", "male_flow"),  ← WRONG: standalone dialogue with no continuation should be plain "male"
  (" The words hit hard.", "narrative_flow")  ← WRONG: new paragraph = plain "narrative"

REMEMBER:
- _flow = DIALOGUE tag (male_flow, female_flow) when a speech tag follows on the same line
- The speech tag after it = PLAIN narrative (with leading space)
- narrative_flow should almost NEVER appear. If you find yourself writing narrative_flow, you are probably making a mistake.
- Standalone dialogue on its own line = plain tag, NO _flow
- New paragraphs = plain tags, NEVER _flow

Output each section with these exact headers:
**Hook:**
**Caption:**
**Context:**
**Transfer Data:**`;

function parseTupleData(raw) {
  const entries = [];

  // Pre-normalize: convert Sonnet-style escaped quotes to doubled quotes format
  let normalized = raw;
  // Convert curly quotes to straight for parsing consistency
  normalized = normalized.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'");
  // Split multi-tuple lines: Sonnet sometimes puts multiple tuples on one line
  // e.g. (""Hello,"", "male_flow"), (" he said.", "narrative"),
  // Split these into separate lines so Strategy 1 can handle them
  normalized = normalized.replace(/\)\s*,\s*\(/g, ')\n(');
  // Convert escaped \" inside tuples to doubled ""
  normalized = normalized.replace(/\(\s*"((?:[^)]*?))"\s*,\s*"(\w+)"\s*\)/g, (match, text, tag) => {
    if (text.includes('\\"')) {
      let cleaned = text.replace(/\\"/g, '"');
      return `("${cleaned}", "${tag}")`;
    }
    return match;
  });

  // STRATEGY 1: Line-by-line robust parsing
  // Handles: doubled "" quotes, triple """, curly quotes, and plain strings
  const lines = normalized.split('\n');
  for (const line of lines) {
    const t = line.trim();
    if (!t.startsWith('(')) continue;
    const tagMatch = t.match(/,\s*"(\w+)"\s*\)\s*,?\s*$/);
    if (!tagMatch) continue;
    const tag = tagMatch[1];
    const tagPart = tagMatch[0];
    const tagStart = t.lastIndexOf(tagPart);
    let inner = t.substring(1, tagStart).trim();

    // Count leading and trailing straight quotes
    let leadQ = 0, trailQ = 0;
    while (leadQ < inner.length && inner[leadQ] === '"') leadQ++;
    while (trailQ < inner.length && inner[inner.length - 1 - trailQ] === '"') trailQ++;

    if (leadQ >= 3 && trailQ >= 3) {
      inner = inner.substring(leadQ - 1, inner.length - (trailQ - 1));
    } else if (leadQ >= 2 && trailQ >= 2) {
      inner = inner.substring(leadQ - 1, inner.length - (trailQ - 1));
    } else if (leadQ >= 1 && trailQ >= 1) {
      inner = inner.substring(1, inner.length - 1);
    }

    // Convert remaining straight " to curly quotes (open/close toggle)
    let result = '';
    let nextIsOpen = !inner.startsWith(' ');
    for (let ci = 0; ci < inner.length; ci++) {
      if (inner[ci] === '"') {
        result += nextIsOpen ? '\u201C' : '\u201D';
        nextIsOpen = !nextIsOpen;
      } else {
        result += inner[ci];
      }
    }

    result = result.replace(/\\n/g, '\n').replace(/\\\\/g, '\\');
    if (result) entries.push({ text: result, tag });
  }
  if (entries.length > 0) return entries;

  // STRATEGY 2: Regex fallback for compact/single-line formats
  const regex = /\(\s*"((?:[^"\\]|\\.)*)"\s*,\s*"(\w+)"\s*\)/g;
  let m;
  while ((m = regex.exec(normalized)) !== null) {
    let text = m[1].replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
    entries.push({ text, tag: m[2] });
  }
  if (entries.length > 0) return entries;

  // STRATEGY 3: Single-quote fallback
  const regexS = /\(\s*'((?:[^'\\]|\\.)*)'\s*,\s*'(\w+)'\s*\)/g;
  while ((m = regexS.exec(normalized)) !== null) {
    let text = m[1].replace(/\\n/g, '\n').replace(/\\'/g, "'").replace(/\\\\/g, '\\');
    entries.push({ text, tag: m[2] });
  }
  return entries;
}

function isFlowTag(tag) { return tag.endsWith("_flow") || tag.endsWith("_italic_flow") || tag.endsWith("_bold_italic_flow") || tag.endsWith("_bold_flow"); }
function isUnderlineTag(tag) { return tag.includes("_underline"); }
function isItalicTag(tag) { return tag.includes("_italic"); }
function isBoldTag(tag) { return tag.includes("_bold"); }
function isBoldItalicTag(tag) { return tag.includes("_bold_italic"); }
function getHL(tag) { return COLOR_MAP[tag] || null; }
function hasCensor(w) { return w.includes("*"); }

function buildGroups(entries) {
  if (!entries.length) return [];
  const g = []; let c = [];
  let inFlowGroup = false;
  for (let i = 0; i < entries.length; i++) {
    const e = entries[i];
    const eIsFlow = isFlowTag(e.tag);
    const eStartsNewParagraph = !e.text.startsWith(' ') && !eIsFlow;
    
    if (inFlowGroup) {
      if (eIsFlow) {
        // Another _flow piece continues the group (mid-sentence style change)
        c.push(e);
      } else if (e.text.startsWith(' ')) {
        // Speech tag continuation — finishes the flow group
        c.push(e);
        inFlowGroup = false;
      } else if (!eStartsNewParagraph && (isBoldTag(e.tag) || isItalicTag(e.tag))) {
        // Bold/italic mid-sentence fragment (no leading space, not _flow, but styled)
        // e.g. ("needed", "male_italic") between flow pieces
        c.push(e);
      } else {
        // New paragraph — close current group, start fresh
        if (c.length) g.push(c);
        c = [e];
        inFlowGroup = false;
      }
    } else {
      if (eIsFlow) {
        // Start a new flow group
        if (c.length) g.push(c);
        c = [e];
        inFlowGroup = true;
      } else {
        // Standalone entry — new group
        if (c.length) g.push(c);
        c = [e];
        inFlowGroup = false;
      }
    }
  }
  if (c.length) g.push(c);
  return g;
}

function renderKindle(canvas, groups, scale, fontName, fontSize) {
  const S = scale;
  const ctx = canvas.getContext('2d');
  const baseW = Math.round(540 * (fontSize / 20));
  const CW = baseW * S;
  const MX = Math.round(20 * (fontSize / 20)) * S;
  const MTW = CW - MX * 2;
  const FS = fontSize * S;
  const LH = Math.round(FS * 1.35);
  const PG = Math.round(FS * 0.00);
  const IND = Math.round(FS * 1.2);
  const TM = 13 * S;
  const BM = 10 * S;
  const HLP_T = Math.round(3 * S);
  const HLP_B = Math.round(5 * S);
  const fontStr = `500 ${FS}px "${fontName}", Georgia, serif`;
  ctx.font = fontStr;

  function tokenize(group) {
    const tokens = [];
    for (const entry of group) {
      const parts = entry.text.split(/( +)/);
      for (const p of parts) {
        if (p === '') continue;
        tokens.push({ text: p, tag: entry.tag, isSp: /^ +$/.test(p) });
      }
    }
    return tokens;
  }

  function layoutLines(tokens, indent) {
    const lines = [];
    let cur = [], curW = 0;
    let sx = indent, mw = MTW - indent, first = true;
    function tagFont(tag) {
      const bold = isBoldTag(tag);
      const italic = isItalicTag(tag);
      if (bold && italic) return `italic 700 ${FS}px "${fontName}", Georgia, serif`;
      if (bold) return `700 ${FS}px "${fontName}", Georgia, serif`;
      if (italic) return `italic 500 ${FS}px "${fontName}", Georgia, serif`;
      return fontStr;
    }
    for (const t of tokens) {
      if (t.isSp) {
        if (cur.length > 0) {
          ctx.font = tagFont(t.tag);
          curW += ctx.measureText(t.text).width; cur.push(t);
        }
        continue;
      }
      ctx.font = tagFont(t.tag);
      const ww = ctx.measureText(t.text).width;
      if (cur.length > 0 && curW + ww > mw) {
        while (cur.length && cur[cur.length - 1].isSp) {
          ctx.font = tagFont(cur[cur.length-1].tag);
          curW -= ctx.measureText(cur.pop().text).width;
        }
        lines.push({ tokens: cur, w: curW, indent: sx, just: true });
        cur = []; curW = 0;
        if (first) { first = false; sx = 0; mw = MTW; }
      }
      cur.push(t); curW += ww;
    }
    if (cur.length) {
      while (cur.length && cur[cur.length - 1].isSp) cur.pop();
      lines.push({ tokens: cur, w: curW, indent: sx, just: false });
    }
    ctx.font = fontStr;
    return lines;
  }

  const allLines = [];
  for (let g = 0; g < groups.length; g++) {
    allLines.push(layoutLines(tokenize(groups[g]), IND));
  }

  let nLines = 0;
  for (const gl of allLines) nLines += gl.length;
  const totalH = TM + nLines * LH + (allLines.length - 1) * PG + BM;
  canvas.width = CW;
  canvas.height = totalH;
  canvas.style.width = baseW + 'px';
  canvas.style.height = (totalH / S) + 'px';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, CW, totalH);
  ctx.font = fontStr;
  ctx.textBaseline = 'alphabetic';
  const asc = ctx.measureText('Mg').actualBoundingBoxAscent || FS * 0.76;

  // PASS 1: Compute word positions
  const lineData = [];
  let y = TM;
  for (let g = 0; g < allLines.length; g++) {
    for (const line of allLines[g]) {
      const bx = MX + line.indent;
      const words = line.tokens.filter(t => !t.isSp);
      let tww = 0;
      for (const w of words) {
        const bold = isBoldTag(w.tag), italic = isItalicTag(w.tag);
        ctx.font = bold && italic ? `italic 700 ${FS}px "${fontName}", Georgia, serif` : bold ? `700 ${FS}px "${fontName}", Georgia, serif` : italic ? `italic 500 ${FS}px "${fontName}", Georgia, serif` : fontStr;
        tww += ctx.measureText(w.text).width;
      }
      ctx.font = fontStr;
      const sw = (line.just && words.length > 1)
        ? (MTW - line.indent - tww) / (words.length - 1)
        : ctx.measureText(' ').width;
      const wps = [];
      let dx = bx;
      for (let i = 0; i < words.length; i++) {
        const bold = isBoldTag(words[i].tag), italic = isItalicTag(words[i].tag);
        ctx.font = bold && italic ? `italic 700 ${FS}px "${fontName}", Georgia, serif` : bold ? `700 ${FS}px "${fontName}", Georgia, serif` : italic ? `italic 500 ${FS}px "${fontName}", Georgia, serif` : fontStr;
        const ww = ctx.measureText(words[i].text).width;
        wps.push({ x: dx, w: ww, tok: words[i] });
        dx += ww + (i < words.length - 1 ? sw : 0);
      }
      ctx.font = fontStr;
      lineData.push({ y, wps, indent: line.indent, groupIdx: g });
      y += LH;
    }
    if (g < allLines.length - 1) y += PG;
  }

  // PASS 2: Highlights with multi-line spanning
  for (let li = 0; li < lineData.length; li++) {
    const ld = lineData[li];
    const { y: ly, wps } = ld;
    let hi = 0;
    while (hi < wps.length) {
      const col = getHL(wps[hi].tok.tag);
      if (!col) { hi++; continue; }
      let he = hi;
      while (he + 1 < wps.length && getHL(wps[he + 1].tok.tag) === col) he++;
      const isFirstWord = hi === 0;
      const isLastWord = he === wps.length - 1;
      const prevLine = li > 0 ? lineData[li - 1] : null;
      const sameGroupAsPrev = prevLine && prevLine.groupIdx === ld.groupIdx;
      const prevLastCol = (sameGroupAsPrev && prevLine.wps.length > 0) ? getHL(prevLine.wps[prevLine.wps.length - 1].tok.tag) : null;
      const continuesFromPrev = isFirstWord && prevLastCol === col;
      const nextLine = li < lineData.length - 1 ? lineData[li + 1] : null;
      const sameGroupAsNext = nextLine && nextLine.groupIdx === ld.groupIdx;
      const nextFirstCol = (sameGroupAsNext && nextLine.wps.length > 0) ? getHL(nextLine.wps[0].tok.tag) : null;
      const continuesToNext = isLastWord && nextFirstCol === col;
      const rx = continuesFromPrev ? MX : wps[hi].x;
      const rEndX = continuesToNext ? (CW - MX) : (wps[he].x + wps[he].w);
      const rt = ly - HLP_T;
      const rb = continuesToNext ? (ly + LH - HLP_T) : (ly + asc + HLP_B);
      ctx.fillStyle = col;
      ctx.fillRect(rx, rt, rEndX - rx, rb - rt);
      hi = he + 1;
    }
  }

  // PASS 3: Text, censorship, underlines
  for (let li = 0; li < lineData.length; li++) {
    const { y: ly, wps } = lineData[li];
    const ty = ly + asc;
    ctx.fillStyle = '#1a1a1a';
    ctx.font = fontStr;
    for (const wp of wps) {
      const bold = isBoldTag(wp.tok.tag), italic = isItalicTag(wp.tok.tag);
      ctx.font = bold && italic ? `italic 700 ${FS}px "${fontName}", Georgia, serif` : bold ? `700 ${FS}px "${fontName}", Georgia, serif` : italic ? `italic 500 ${FS}px "${fontName}", Georgia, serif` : fontStr;
      ctx.fillText(wp.tok.text, wp.x, ty);
      if (hasCensor(wp.tok.text)) {
        ctx.beginPath();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2.5 * S;
        const sy = ty - asc * 0.35;
        ctx.moveTo(wp.x, sy); ctx.lineTo(wp.x + wp.w, sy);
        ctx.stroke();
      }
    }
    let ui = 0;
    while (ui < wps.length) {
      if (!isUnderlineTag(wps[ui].tok.tag)) { ui++; continue; }
      let ue = ui;
      while (ue + 1 < wps.length && isUnderlineTag(wps[ue + 1].tok.tag)) ue++;
      ctx.beginPath();
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1.5 * S;
      ctx.moveTo(wps[ui].x, ty + 3 * S);
      ctx.lineTo(wps[ue].x + wps[ue].w, ty + 3 * S);
      ctx.stroke();
      ui = ue + 1;
    }
  }
}

function parseGeminiResponse(text){const r={hook:"",caption:"",context:"",tupleRaw:""};const hk=text.match(/\*?\*?Hook:?\*?\*?\s*([\s\S]*?)(?=\*?\*?Caption:?\*?\*?)/i);const cp=text.match(/\*?\*?Caption:?\*?\*?\s*([\s\S]*?)(?=\*?\*?Context:?\*?\*?)/i);const cx=text.match(/\*?\*?Context:?\*?\*?\s*([\s\S]*?)(?=\*?\*?Transfer Data:?\*?\*?)/i);const td=text.match(/\*?\*?Transfer Data:?\*?\*?\s*([\s\S]*?)$/i);if(hk)r.hook=hk[1].trim();if(cp)r.caption=cp[1].trim();if(cx)r.context=cx[1].trim();if(td){let raw=td[1].trim().replace(/^```(?:python)?\s*/i,'').replace(/\s*```\s*$/,'');r.tupleRaw=raw.trim()}return r}

function splitReactionFromCaption(captionText){
  if(!captionText)return{reaction:"",caption:""};
  const lines=captionText.split('\n').filter(l=>l.trim());
  // First line is reaction if it doesn't start with 📚 or —
  if(lines.length>0&&!lines[0].includes('📚')&&!lines[0].startsWith('—')){
    return{reaction:lines[0].trim(),caption:lines.slice(1).join('\n')};
  }
  return{reaction:"",caption:captionText};
}

// Auto-fix Gemini tuple issues:
// 1. Split tuples that contain BOTH dialogue and narration
// 2. Fix _flow tags: dialogue gets _flow, narrative continuation gets plain tag
function autoFixFlowTags(rawTuple) {
  // Normalize curly quotes and escaped quotes before processing
  rawTuple = rawTuple.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'");
  rawTuple = rawTuple.replace(/\\"/g, '"');
  // Split multi-tuple lines into separate lines
  rawTuple = rawTuple.replace(/\)\s*,\s*\(/g, ')\n(');

  const lines = rawTuple.split('\n');
  const result = [];

  // PASS 0: Split mixed tuples (dialogue + narration in same tuple)
  for (let i = 0; i < lines.length; i++) {
    const trimmed = lines[i].trim();
    const tagMatch = trimmed.match(/,\s*"(\w+)"\s*\)\s*,?\s*$/);
    if (!trimmed.startsWith('(') || !tagMatch) {
      result.push(lines[i]);
      continue;
    }
    const tag = tagMatch[1];
    const baseTag = tag.replace(/_flow|_underline|_bold|_italic/g, '').replace(/^$/, 'narrative');
    const tagPart = tagMatch[0];
    const tagStart = trimmed.lastIndexOf(tagPart);
    let inner = trimmed.substring(1, tagStart).trim();

    // Strip outer string quotes
    if (inner.startsWith('"') && inner.endsWith('"')) {
      inner = inner.substring(1, inner.length - 1);
    }

    // Detect if this tuple has BOTH dialogue marks and narration text outside them
    // Pattern: narration text followed by ""dialogue"" or ""dialogue"" followed by narration
    const splitParts = [];
    let remaining = inner;
    let hadSplit = false;

    // Repeatedly extract dialogue chunks (""..."") and narration between them
    while (remaining.length > 0) {
      // Find next dialogue opening ""
      const dStart = remaining.indexOf('""');
      if (dStart === -1) {
        // Rest is narration
        if (remaining.trim()) splitParts.push({ text: remaining, isDialogue: false });
        break;
      }
      // Everything before the "" is narration
      if (dStart > 0) {
        const narr = remaining.substring(0, dStart);
        if (narr.trim()) splitParts.push({ text: narr, isDialogue: false });
      }
      // Find closing ""
      const afterOpen = remaining.substring(dStart + 2);
      const dEnd = afterOpen.indexOf('""');
      if (dEnd === -1) {
        // No closing — treat rest as dialogue
        splitParts.push({ text: remaining.substring(dStart), isDialogue: true });
        break;
      }
      // Extract the dialogue including the "" marks
      const dialogue = remaining.substring(dStart, dStart + 2 + dEnd + 2);
      splitParts.push({ text: dialogue, isDialogue: true });
      remaining = remaining.substring(dStart + 2 + dEnd + 2);
      if (splitParts.length > 1) hadSplit = true;
    }

    if (hadSplit && splitParts.length > 1) {
      // Rebuild as separate tuples
      for (let p = 0; p < splitParts.length; p++) {
        const part = splitParts[p];
        let partTag;
        if (part.isDialogue) {
          // Check if next part is narration starting with space (speech tag) → use _flow
          const nextPart = p + 1 < splitParts.length ? splitParts[p + 1] : null;
          const nextIsNarr = nextPart && !nextPart.isDialogue;
          const dialogueEndsWithComma = /,\s*""$/.test(part.text);
          if (nextIsNarr && dialogueEndsWithComma) {
            partTag = baseTag === 'narrative' ? 'female_flow' : baseTag + '_flow';
          } else {
            partTag = baseTag === 'narrative' ? 'female' : baseTag;
          }
        } else {
          partTag = 'narrative';
        }
        const text = part.text;
        result.push(`  ("${text}", "${partTag}"),`);
      }
    } else {
      result.push(lines[i]);
    }
  }

  // PASS 1 & 2: Fix flow tags on the rebuilt lines
  const tupleLines = [];
  for (let i = 0; i < result.length; i++) {
    const trimmed = result[i].trim();
    const tagMatch = trimmed.match(/,\s*"(\w+)"\s*\)\s*,?\s*$/);
    if (!trimmed.startsWith('(') || !tagMatch) continue;
    const tag = tagMatch[1];
    const hasDialogue = /\(\s*""/.test(trimmed) || /\(\s*"[\u201C]/.test(trimmed);
    const textStartsWithSpace = /\(\s*" /.test(trimmed);
    tupleLines.push({idx: i, line: result[i], tag, hasDialogue, textStartsWithSpace, trimmed});
  }

  // Kill ALL narrative_flow/internal_flow/other_flow → plain tags
  for (const cur of tupleLines) {
    if (cur.tag === 'narrative_flow' || cur.tag === 'internal_flow' || cur.tag === 'other_flow') {
      const bt = cur.tag.replace('_flow', '');
      cur.line = cur.line.replace('"' + cur.tag + '"', '"' + bt + '"');
      cur.tag = bt;
    }
  }

  // Fix _flow placement: dialogue gets _flow when speech tag follows
  for (let t = 0; t < tupleLines.length; t++) {
    const cur = tupleLines[t];
    const next = t + 1 < tupleLines.length ? tupleLines[t + 1] : null;

    if (!cur.hasDialogue) continue;
    if (cur.tag.includes('_underline')) continue;

    const baseTag = cur.tag.replace(/_flow/g, '');
    // Dialogue ending with comma, question mark, or exclamation before closing "" = speech tag may follow
    const endsBeforeClose = /[,?!]\s*""\s*,\s*"/.test(cur.trimmed) || /[,?!]\u201D"\s*,\s*"/.test(cur.trimmed);
    const shouldFlow = endsBeforeClose && next &&
      !next.hasDialogue &&
      next.textStartsWithSpace &&
      (next.tag === 'narrative' || next.tag === 'internal' || next.tag === 'other');

    if (shouldFlow && !cur.tag.endsWith('_flow')) {
      cur.line = cur.line.replace('"' + cur.tag + '"', '"' + baseTag + '_flow"');
      cur.tag = baseTag + '_flow';
    } else if (!shouldFlow && cur.tag.endsWith('_flow')) {
      cur.line = cur.line.replace('"' + cur.tag + '"', '"' + baseTag + '"');
      cur.tag = baseTag;
    }
  }

  for (const tl of tupleLines) {
    result[tl.idx] = tl.line;
  }
  return result.join('\n');
}

async function extractPDFText(file){if(!window.pdfjsLib){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';document.head.appendChild(s);await new Promise((r,j)=>{s.onload=r;s.onerror=j});window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'}const pdf=await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;let t='';for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();t+=tc.items.map(it=>it.str).join(' ')+'\n'}return t}

                  <select value={claudeModel} onChange={e=>setClaudeModel(e.target.value)} style={{...ST.input,cursor:"pointer",appearance:"auto",fontFamily:"'DM Sans', sans-serif",fontSize:"13px"}}>

                        <div style={{flex:1}}><label style={ST.label}>Book Title</label><input value={newBookTitle} onChange={e=>setNewBookTitle(e.target.value)} placeholder="e.g. Dark Billionaire Stalker" style={{...ST.input,fontSize:"12px"}} /></div>
                        <div style={{flex:1}}><label style={ST.label}>Author</label><input value={newBookAuthor} onChange={e=>{setNewBookAuthor(e.target.value);const proj=PROJECT_MAP.find(pr=>pr.authors.some(a=>e.target.value.toLowerCase().includes(a.toLowerCase())));if(proj)setNewBookProject(proj.initials)}} placeholder="e.g. Lara Hart" style={{...ST.input,fontSize:"12px"}} /></div>

                    {(newBookPdfText||newBookTitle)&&(
                      <div style={{display:"flex",gap:"10px",alignItems:"flex-end"}}>

                          <div style={{display:"flex",gap:"6px"}}>
                            {["RE","DK","PV"].map(p=>(<button key={p} onClick={()=>setNewBookProject(p)} style={{padding:"6px 14px",borderRadius:"4px",fontSize:"11px",fontWeight:600,fontFamily:"'DM Sans', sans-serif",border:"1px solid",cursor:"pointer",borderColor:newBookProject===p?(p==="RE"?"#e85d3a":p==="DK"?"#6366f1":"#d946a8"):"#e8e6e1",backgroundColor:newBookProject===p?(p==="RE"?"#fef0ec":p==="DK"?"#eef0fe":"#fdf0fa"):"transparent",color:newBookProject===p?(p==="RE"?"#e85d3a":p==="DK"?"#6366f1":"#d946a8"):"#a09a93"}}>{p}</button>))}
                          </div>
                        </div>
                        <div style={{flex:1}} />

                    const projBg=proj==="RE"?"#fef0ec":proj==="DK"?"#eef0fe":"#fdf0fa";
                    const projBorder=proj==="RE"?"#e85d3a":proj==="DK"?"#6366f1":"#d946a8";

                    return (
                      <div key={proj} style={{display:"flex",alignItems:"center",gap:"10px"}}>

                        <select value={selId} onChange={e=>{const book=books.find(b=>b.id===e.target.value);if(book)selectBook(book);else if(!e.target.value){setSelectedBook(null);setPdfText("")}}} style={{...ST.input,flex:1,cursor:"pointer",appearance:"auto",fontSize:"12px",color:selId?"#1a1815":"#a09a93"}}>
                          <option value="">— Select a book —</option>
                          {projBooks.map(b=>(<option key={b.id} value={b.id}>{b.title} — {b.author}</option>))}
                        </select>
                        {selId&&<button onClick={()=>{if(confirm(`Delete "${selectedBook.title}"?`))deleteBook(selectedBook.id)}} title="Delete this book" style={{background:"none",border:"1px solid #e8e6e1",borderRadius:"4px",color:"#a09a93",cursor:"pointer",fontSize:"13px",padding:"6px 10px",lineHeight:1,transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.color='#dc3545';e.currentTarget.style.borderColor='#f5c6cb'}} onMouseLeave={e=>{e.currentTarget.style.color='#a09a93';e.currentTarget.style.borderColor='#e8e6e1'}}>×</button>}
                      </div>
                    );
                  })}
                </div>
                {books.length===0&&!addingBook&&(
                  <div style={{textAlign:"center",padding:"16px",color:"#c4bfb8",fontSize:"12px",fontFamily:"'DM Sans', sans-serif",marginTop:"8px"}}>Click "+ Add Book" to build your library</div>

              </div>

              {error&&<div style={{padding:"10px 14px",backgroundColor:"#fef0ec",border:"1px solid #f5c6cb",borderRadius:"6px",color:"#dc3545",fontSize:"12px",marginBottom:"16px",fontFamily:"'DM Sans', sans-serif"}}>{error}</div>}

              {/* Selected book confirmation */}
              {selectedBook&&(
                <div style={{padding:"12px 16px",backgroundColor:"#edf7f1",borderRadius:"8px",border:"1px solid #c3e6cb",marginBottom:"16px",display:"flex",alignItems:"center",gap:"10px"}}>
                  <span style={{color:"#2da562",fontSize:"14px"}}>✓</span>
                  <span style={{fontSize:"12px",color:"#2da562",fontFamily:UI_FONT,fontWeight:500}}>{selectedBook.title} by {selectedBook.author}</span>
                </div>
              )}

              <div style={{display:"flex",gap:"10px"}}>
                <button onClick={()=>setWizardStep(1)} style={{...ST.btn,padding:"14px 20px",backgroundColor:"transparent",color:"#a09a93",border:"1px solid #e8e6e1",fontSize:"13px",borderRadius:"10px"}}>← Back</button>
                <button onClick={()=>setWizardStep(3)} disabled={!selectedBook||!pdfText} style={{...ST.btn,flex:1,padding:"14px",backgroundColor:!selectedBook||!pdfText?"#f0eeea":"#e85d3a",color:!selectedBook||!pdfText?"#a09a93":"#fff",fontSize:"14px",borderRadius:"10px"}}>
                  Continue →
                </button>
              </div>
            </div>
          )}

          {/* STEP 3: Select Vibe & Generate */}
          {wizardStep===3&&(
            <div style={{animation:"fadeIn 0.25s ease"}}>
              <div style={{marginBottom:"24px"}}>
                <h3 style={{fontFamily:"'Fraunces',serif",fontSize:"20px",fontWeight:700,color:"#1a1815",marginBottom:"4px"}}>Pick a vibe</h3>
                <p style={{fontSize:"12px",color:"#a09a93",fontFamily:UI_FONT}}>What kind of scene are you looking for in <strong style={{color:"#1a1815"}}>{selectedBook?.title||"this book"}</strong>?</p>
              </div>

              <div style={{marginBottom:"20px"}}>
                <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"12px"}}>
                  {VIBES.map(v=>(<button key={v} onClick={()=>{setSelectedVibe(v);setCustomVibe("")}} style={{padding:"8px 14px",borderRadius:"20px",fontSize:"12px",border:selectedVibe===v?"1px solid #e85d3a":"1px solid #e8e6e1",backgroundColor:selectedVibe===v?"#fef0ec":"#fff",color:selectedVibe===v?"#e85d3a":"#6b6660",cursor:"pointer",transition:"all 0.15s",fontFamily:UI_FONT}}>{v}</button>))}
                </div>
                <input value={customVibe} onChange={e=>{setCustomVibe(e.target.value);if(e.target.value)setSelectedVibe("")}} placeholder="Or type a custom vibe..." style={{...ST.input,fontSize:"13px"}} />
              </div>

              {error&&<div style={{padding:"10px 14px",backgroundColor:"#fef0ec",border:"1px solid #f5c6cb",borderRadius:"6px",color:"#dc3545",fontSize:"12px",marginBottom:"16px",fontFamily:"'DM Sans', sans-serif"}}>{error}</div>}

              <div style={{display:"flex",gap:"10px"}}>
                <button onClick={()=>setWizardStep(2)} style={{...ST.btn,padding:"14px 20px",backgroundColor:"transparent",color:"#a09a93",border:"1px solid #e8e6e1",fontSize:"13px",borderRadius:"10px"}}>← Back</button>
                <button onClick={callGemini} disabled={loading||(!selectedVibe&&!customVibe.trim())} style={{...ST.btn,flex:1,padding:"14px",backgroundColor:loading||(!selectedVibe&&!customVibe.trim())?"#f0eeea":"#e85d3a",color:loading||(!selectedVibe&&!customVibe.trim())?"#a09a93":"#fff",fontSize:"14px",borderRadius:"10px"}}>
                  {loading?(<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}><span style={{display:"inline-block",width:"14px",height:"14px",border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}} />{loadingStatus}</span>):(useHybrid?"Generate — Hybrid Mode":"Generate BookTok Assets")}
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* PHOTO LIBRARY TAB */}

      {/* EXCERPT TAB — rendered preview + tuple editor + font settings */}
      {activeTab==="excerpt"&&step==="results"&&(
        <div style={{display:"flex",minHeight:"calc(100vh - 90px)",paddingBottom:"60px"}}>
          <div style={{width:"430px",minWidth:"390px",padding:"18px",borderRight:"1px solid #e8e6e1",overflowY:"auto",display:"flex",flexDirection:"column",gap:"14px"}}>
            {getProject(author)&&<div style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 12px",backgroundColor:"#fff",borderRadius:"6px",border:"1px solid #e8e6e1"}}><span style={{fontSize:"10px",fontWeight:700,letterSpacing:"1.5px",padding:"3px 8px",borderRadius:"4px",backgroundColor:getProject(author)==="RE"?"#fef0ec":getProject(author)==="DK"?"#eef0fe":"#fdf0fa",color:getProject(author)==="RE"?"#e85d3a":getProject(author)==="DK"?"#6366f1":"#d946a8",fontFamily:"'DM Sans', sans-serif"}}>{getProject(author)}</span><span style={{fontSize:"11px",color:"#a09a93",fontFamily:"'DM Sans', sans-serif"}}>Tasks {getProject(author)}</span></div>}

            <div style={{borderTop:"1px solid #e8e6e1",margin:"4px 0"}} />
            <div><label style={ST.label}>Font</label><select value={fontName} onChange={e=>setFontName(e.target.value)} style={{...ST.input,cursor:"pointer",appearance:"auto"}}>{FONT_OPTIONS.map(f=><option key={f} value={f}>{f}</option>)}{customFontName&&<option value={customFontName}>{customFontName}</option>}</select></div>
            <div>
              <label style={ST.label}>Custom Font <span style={{textTransform:"none",color:"#c4bfb8"}}>(.ttf .woff2 .otf — select multiple for variants)</span></label>
              <input ref={fontFileRef} type="file" accept=".ttf,.woff,.woff2,.otf" multiple onChange={e=>loadCustomFont(e.target.files)} style={{display:"none"}} />
              <button onClick={()=>fontFileRef.current?.click()} style={{...ST.input,cursor:"pointer",fontSize:"12px",color:"#a09a93",textAlign:"left"}}>{customFontName?`✓ ${customFontName}`:"Choose font file..."}</button>
            </div>
            <div>
              <label style={ST.label}>Font Size <span style={{textTransform:"none",color:"#a09a93"}}>{fontSize}px</span></label>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}><span style={{fontSize:"10px",color:"#c4bfb8"}}>10</span><input type="range" min={10} max={30} value={fontSize} onChange={e=>setFontSize(Number(e.target.value))} style={{flex:1,accentColor:"#e85d3a"}} /><span style={{fontSize:"10px",color:"#c4bfb8"}}>30</span></div>
            </div>
            <div><label style={ST.label}>Author / Book</label><input value={author} onChange={e=>setAuthor(e.target.value)} placeholder="Author — Book Title" style={ST.input} /></div>
            <div>
              <label style={ST.label}>Tuple Data <span style={{textTransform:"none",color:"#c4bfb8"}}>(editable)</span></label>
              <textarea value={tupleRaw} onChange={e=>setTupleRaw(e.target.value)} spellCheck={false} style={{...ST.input,height:"300px",resize:"vertical",color:"#e85d3a",fontSize:"11px",fontFamily:"'DM Sans', monospace",lineHeight:"1.5",backgroundColor:"#f0eeea"}} />
            </div>
            {error&&<div style={{padding:"8px 12px",backgroundColor:"#fef0ec",border:"1px solid #f5c6cb",borderRadius:"6px",color:"#dc3545",fontSize:"11px",fontFamily:"'DM Sans', sans-serif"}}>{error}</div>}
            <div style={{display:"flex",gap:"8px"}}>
              <button onClick={doRender} style={{...ST.btn,flex:1,backgroundColor:"#e85d3a",color:"#fff",borderRadius:"8px"}}>Render</button>
              {rendered&&<button onClick={doCopy} style={{...ST.btn,padding:"10px 14px",backgroundColor:copied?"#edf7f1":"transparent",color:copied?"#2da562":"#6b6660",border:`1px solid ${copied?"#c3e6cb":"#e8e6e1"}`}}>{copied?"✓ Copied":"Copy Image"}</button>}
            </div>
            <div style={{...ST.card,fontSize:"11px"}}>
              <div style={{...ST.label,marginBottom:"6px"}}>Legend</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"6px"}}>
                {[["Male","#B5CDFD"],["Female","#FEC2D3"],["Internal","#FFF8B3"],["Other","#FDD9B0"],["Narr.",null]].map(([l,c])=>(<div key={l} style={{display:"flex",alignItems:"center",gap:"4px"}}><div style={{width:"10px",height:"10px",borderRadius:"2px",backgroundColor:c||"transparent",border:c?"none":"1px solid #e8e6e1"}} /><span style={{color:"#a09a93"}}>{l}</span></div>))}
              </div>
              <div style={{color:"#c4bfb8",fontFamily:"'DM Sans', sans-serif",lineHeight:1.6,fontSize:"10px"}}>_flow = same line · _underline = underline · _bold = bold · _italic = italic · w*rd = censor</div>
            </div>
          </div>

          <div style={{flex:1,padding:"18px",overflowY:"auto",display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{...ST.label,alignSelf:"flex-start",marginBottom:"12px"}}>Preview{author&&<span style={{textTransform:"none",marginLeft:"10px",color:"#c4bfb8",letterSpacing:"0"}}> — {author}</span>}</div>
            <div style={{boxShadow:rendered?"0 4px 24px rgba(26,24,21,0.08)":"none",borderRadius:rendered?"2px":"0"}}><canvas ref={canvasRef} style={{display:rendered?"block":"none"}} /></div>
            {!rendered&&(<div style={{width:"540px",height:"350px",backgroundColor:"#fff",borderRadius:"8px",border:"1px dashed #e8e6e1",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"10px"}}><div style={{fontSize:"28px",opacity:0.2}}>📖</div><div style={{color:"#c4bfb8",fontSize:"12px",fontFamily:"'DM Sans', sans-serif"}}>{tupleRaw?"Click Render to generate preview":"Generate an excerpt to preview"}</div></div>)}
          </div>
        </div>
      )}

      {/* POST TAB — hook, hook forge, caption, context, photos */}
      {activeTab==="post"&&step==="results"&&(
        <div style={{maxWidth:"640px",margin:"0 auto",padding:"24px",display:"flex",flexDirection:"column",gap:"14px"}}>
            <div style={ST.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}><label style={{...ST.label,marginBottom:0}}>Hook (Slide 1)</label><CopyBtn field="hook" text={hook} /></div>
              <textarea value={hook} onChange={e=>setHook(e.target.value)} style={{...ST.input,height:"60px",resize:"vertical",fontSize:"14px",fontWeight:600,color:"#1a1815"}} />
            </div>

            {/* === HOOK FORGE === */}
            <div style={{...ST.card,border:hookForgeOpen?"1px solid #d4c060":"1px solid #e8e6e1",transition:"border-color 0.2s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:hookForgeOpen?"10px":"0"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <span style={{fontSize:"13px"}}>⚡</span>
                  <label style={{...ST.label,marginBottom:0,color:"#b8a040"}}>Hook Forge</label>
                  <span style={{fontSize:"9px",padding:"1px 6px",borderRadius:"3px",backgroundColor:"#faf6e6",color:"#8b7020",fontFamily:"'DM Sans', sans-serif",border:"1px solid #e8ddb0"}}>Claude-powered</span>
                </div>
                <button onClick={hookForgeLoading?undefined:generateHookVariants} disabled={hookForgeLoading} style={{...ST.btn,padding:"5px 14px",fontSize:"10px",backgroundColor:hookForgeLoading?"#f0eeea":"#faf6e6",color:hookForgeLoading?"#a09a93":"#8b7020",border:"1px solid #e8ddb0",transition:"all 0.15s"}}>

                </button>
              </div>
              {hookForgeError&&<div style={{fontSize:"11px",color:"#dc3545",fontFamily:"'DM Sans', sans-serif",padding:"6px 0"}}>{hookForgeError}</div>}
              {hookForgeOpen&&hookVariants.length>0&&(
                <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                  {hookVariants.map((v,i)=>{
                    const typeLabels={"short_emotional":"Short Emotional","short_emotional_alt":"Short Emotional Alt","curiosity_gap":"Curiosity Gap","curiosity_gap_alt":"Curiosity Gap Alt","female_pov":"Female POV","male_pov":"Male POV","trope_stack":"Trope Stack"};
                    const typeColors={"short_emotional":"#7eb8da","short_emotional_alt":"#7eb8da","curiosity_gap":"#da7e9e","curiosity_gap_alt":"#da7e9e","female_pov":"#e8a0c0","male_pov":"#80b8d8","trope_stack":"#dac87e"};
                    const isFirstPov=v.type==="female_pov";
                    const isLastPov=v.type==="male_pov";
                    return(
                      <React.Fragment key={i}>
                        {isFirstPov&&(
                          <div style={{fontSize:"9px",textTransform:"uppercase",letterSpacing:"1.5px",color:"#a09a93",fontFamily:"'DM Sans', sans-serif",padding:"6px 0 2px 0",borderTop:"1px solid #e8e6e1",marginTop:"2px"}}>POV Pair — her side + his side</div>
                        )}
                        <div style={{display:"flex",gap:"8px",alignItems:"flex-start",padding:"8px 10px",backgroundColor:isFirstPov||isLastPov?"#f8f7f5":"#fff",borderRadius:isFirstPov?"6px 6px 0 0":isLastPov?"0 0 6px 6px":"6px",border:"1px solid #e8e6e1",borderBottom:isFirstPov?"1px dashed #e8e6e1":"1px solid #e8e6e1",borderTop:isLastPov?"none":"1px solid #e8e6e1",transition:"border-color 0.15s",cursor:"pointer"}} onClick={()=>setHook(v.hook)} onMouseEnter={e=>e.currentTarget.style.borderColor='#e85d3a'} onMouseLeave={e=>e.currentTarget.style.borderColor='#e8e6e1'}>
                          <span style={{fontSize:"9px",padding:"2px 6px",borderRadius:"3px",backgroundColor:"#f8f7f5",color:typeColors[v.type]||"#888",fontFamily:"'DM Sans', sans-serif",border:"1px solid #e8e6e1",whiteSpace:"nowrap",flexShrink:0,marginTop:"2px"}}>{typeLabels[v.type]||v.type}</span>
                          <span style={{fontSize:"12px",color:"#1a1815",lineHeight:"1.5",flex:1}}>{v.hook}</span>
                          <button onClick={e=>{e.stopPropagation();copyField(v.hook,"hv"+i)}} style={{...ST.btn,padding:"2px 8px",fontSize:"9px",backgroundColor:"transparent",color:copiedField==="hv"+i?"#5cb85c":"#a09a93",border:"1px solid #e8e6e1",flexShrink:0}}>{copiedField==="hv"+i?"✓":"Copy"}</button>
                        </div>
                        {isLastPov&&<div style={{height:"2px"}} />}
                      </React.Fragment>
                    );
                  })}
                  <div style={{fontSize:"10px",color:"#a09a93",fontFamily:"'DM Sans', sans-serif",textAlign:"center",padding:"4px 0"}}>Click any hook to use it as your main hook</div>
                </div>
              )}
            </div>

            {/* === REACTION === */}
            {reaction&&(<div style={ST.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
                <label style={{...ST.label,marginBottom:0}}>Reaction <span style={{textTransform:"none",color:"#c4bfb8"}}>(first line of caption)</span></label>
                <CopyBtn field="reaction" text={reaction} />
              </div>
              <input value={reaction} onChange={e=>setReaction(e.target.value)} style={{...ST.input,fontSize:"14px",fontWeight:600,color:"#1a1815"}} />
            </div>)}

            {/* === CAPTION BUILDER === */}
            <div style={ST.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <label style={{...ST.label,marginBottom:0}}>Caption</label>
                  <button onClick={()=>setMysteryMode(!mysteryMode)} style={{padding:"2px 8px",fontSize:"9px",borderRadius:"10px",border:"1px solid",cursor:"pointer",fontFamily:"'DM Sans', sans-serif",borderColor:mysteryMode?"#d946a8":"#e8e6e1",backgroundColor:mysteryMode?"#fdf0fa":"transparent",color:mysteryMode?"#d946a8":"#a09a93",transition:"all 0.15s"}} title="Mystery mode hides the book title to drive comments">{mysteryMode?"🔮 Mystery Mode":"📖 Normal Mode"}</button>
                  {anthropicKey.trim()&&(
                    <button onClick={detectTropesAndBuildCaption} disabled={captionGenLoading} style={{padding:"2px 8px",fontSize:"9px",borderRadius:"10px",border:"1px solid #e8ddb0",cursor:"pointer",fontFamily:"'DM Sans', sans-serif",backgroundColor:captionGenLoading?"#f0eeea":"#faf6e6",color:captionGenLoading?"#a09a93":"#8b7020",transition:"all 0.15s"}}>{captionGenLoading?"Detecting...":"Auto-detect Tropes"}</button>
                  )}
                </div>
                <CopyBtn field="caption" text={caption} />
              </div>
              {mysteryMode&&<div style={{fontSize:"10px",color:"#da7e9e",fontFamily:"'DM Sans', sans-serif",marginBottom:"6px",padding:"4px 8px",backgroundColor:"#fdf0f6",borderRadius:"4px",border:"1px solid #f0c0d8"}}>Mystery mode: book title hidden. Drop it in the comments to drive engagement.</div>}
              <textarea value={caption} onChange={e=>setCaption(e.target.value)} style={{...ST.input,height:"160px",resize:"vertical",fontSize:"12px",lineHeight:"1.6"}} />
              {detectedTropes.length>0&&(
                <div style={{marginTop:"8px"}}>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                    {detectedTropes.map((t,i)=>(
                      <span key={i} style={{fontSize:"10px",padding:"2px 8px",borderRadius:"10px",backgroundColor:"#f0eeea",color:"#6b6660",border:"1px solid #e8e6e1",fontFamily:"'DM Sans', sans-serif"}}>{t}</span>
                    ))}
                  </div>
                </div>
              )}
              {window._pinterestSearches&&window._pinterestSearches.length>0&&(
                <div style={{marginTop:"8px",padding:"8px 10px",backgroundColor:"#f0f7f0",borderRadius:"6px",border:"1px solid #c3e6cb"}}>
                  <div style={{fontSize:"9px",textTransform:"uppercase",letterSpacing:"1px",color:"#2da562",marginBottom:"6px",fontFamily:"'DM Sans', sans-serif"}}>Pinterest Search Suggestions</div>
                  <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                    {window._pinterestSearches.map((s,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <a href={`https://www.pinterest.com/search/pins/?q=${encodeURIComponent(s)}`} target="_blank" rel="noopener noreferrer" style={{fontSize:"11px",color:"#2da562",fontFamily:"'DM Sans', sans-serif",flex:1,textDecoration:"none",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.textDecoration='underline'} onMouseLeave={e=>e.currentTarget.style.textDecoration='none'}>{s}</a>
                        <button onClick={()=>copyField(s,"ps"+i)} style={{...ST.btn,padding:"1px 6px",fontSize:"9px",backgroundColor:"transparent",color:copiedField==="ps"+i?"#5cb85c":"#a09a93",border:"1px solid #e8e6e1"}}>{copiedField==="ps"+i?"✓":"Copy"}</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
            <div style={ST.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}><label style={{...ST.label,marginBottom:0}}>Context</label><CopyBtn field="context" text={context} /></div>
              <textarea value={context} onChange={e=>setContext(e.target.value)} style={{...ST.input,height:"130px",resize:"vertical",fontSize:"12px",lineHeight:"1.6"}} />
            </div>

            {selectedPhotos.length>0&&(
              <div style={ST.card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                  <label style={{...ST.label,marginBottom:0}}>Selected Photos</label>
                  <button onClick={()=>setActiveTab("photos")} style={{...ST.btn,padding:"3px 8px",fontSize:"10px",backgroundColor:"transparent",color:"#a09a93",border:"1px solid #e8e6e1"}}>Edit</button>
                </div>
                <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                  {selectedPhotos.map(id=>{const p=photos.find(ph=>ph.id===id);if(!p)return null;return(<div key={id} style={{position:"relative",display:"inline-block"}}>
                    <img src={p.full||p.thumb} alt={p.name} style={{width:"70px",height:"70px",objectFit:"cover",borderRadius:"4px",border:"1px solid #e8e6e1",borderRadius:"8px",display:"block"}} />
                    {aiPickedPhotos.includes(id)&&<div style={{position:"absolute",top:"2px",left:"2px",padding:"1px 4px",borderRadius:"2px",backgroundColor:"rgba(26,24,21,0.7)",color:"#2da562",fontSize:"8px",fontFamily:"'DM Sans', sans-serif"}}>AI</div>}
                    <button onClick={async(e)=>{e.stopPropagation();try{const img=new Image();img.crossOrigin="anonymous";img.onload=async()=>{const c=document.createElement("canvas");c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext("2d").drawImage(img,0,0);const blob=await new Promise(r=>c.toBlob(r,"image/png"));await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);e.currentTarget.textContent="✓";setTimeout(()=>{if(e.currentTarget)e.currentTarget.textContent="⎘"},1500)};img.src=p.full||p.thumb}catch(err){console.error(err)}}} title="Copy photo" style={{position:"absolute",bottom:"2px",right:"2px",width:"20px",height:"20px",borderRadius:"3px",backgroundColor:"rgba(26,24,21,0.8)",border:"1px solid #333",color:"#6b6660",fontSize:"11px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}} onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color="#aaa"}>⎘</button>
                  </div>)})}
                </div>
              </div>
            )}
        </div>
      )}

      {/* CHAT DRAWER — collapsible at bottom, on excerpt or post tabs */}
      {(activeTab==="excerpt"||activeTab==="post")&&step==="results"&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,transition:"all 0.3s ease"}}>
          {/* Toggle bar */}
          <div onClick={()=>{setChatOpen(!chatOpen);if(!chatOpen)setTimeout(()=>chatInputRef.current?.focus(),100)}} style={{padding:"10px 24px",backgroundColor:"#fff",borderTop:"1px solid #e8e6e1",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",userSelect:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{fontSize:"14px"}}>💬</span>
              <span style={{fontSize:"12px",fontWeight:600,color:"#6b6660",fontFamily:UI_FONT}}>Ask Gemini about this scene</span>
              {chatMessages.length>0&&<span style={{fontSize:"9px",backgroundColor:"#f0eeea",padding:"1px 6px",borderRadius:"8px",color:"#a09a93",fontFamily:"'DM Sans', sans-serif"}}>{chatMessages.length}</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
              {chatOpen&&chatMessages.length>0&&(
                <button onClick={e=>{e.stopPropagation();setChatMessages([])}} style={{...ST.btn,padding:"3px 10px",fontSize:"10px",backgroundColor:"transparent",color:"#a09a93",border:"1px solid #e8e6e1"}}>Clear</button>
              )}
              <span style={{color:"#a09a93",fontSize:"16px",transition:"transform 0.3s",transform:chatOpen?"rotate(180deg)":"rotate(0deg)"}}>▲</span>
            </div>
          </div>

          {/* Chat panel */}
          {chatOpen&&(
            <div style={{backgroundColor:"#faf9f7",borderTop:"1px solid #e8e6e1",height:"340px",display:"flex",flexDirection:"column"}}>
              {/* Context mode toggle */}
              <div style={{padding:"8px 24px",borderBottom:"1px solid #f0eeea",display:"flex",alignItems:"center",gap:"12px",flexShrink:0}}>
                <span style={{fontSize:"10px",color:"#a09a93",fontFamily:"'DM Sans', sans-serif",textTransform:"uppercase",letterSpacing:"1px"}}>Context:</span>
                <button onClick={()=>setChatContextMode("excerpt")} style={{padding:"4px 12px",fontSize:"11px",borderRadius:"12px",border:"1px solid",cursor:"pointer",fontFamily:UI_FONT,borderColor:chatContextMode==="excerpt"?"#e85d3a":"#e8e6e1",backgroundColor:chatContextMode==="excerpt"?"#f0eeea":"transparent",color:chatContextMode==="excerpt"?"#1a1815":"#a09a93",transition:"all 0.15s"}}>Excerpt Only</button>
                <button onClick={()=>setChatContextMode("full")} style={{padding:"4px 12px",fontSize:"11px",borderRadius:"12px",border:"1px solid",cursor:"pointer",fontFamily:UI_FONT,borderColor:chatContextMode==="full"?"#e85d3a":"#e8e6e1",backgroundColor:chatContextMode==="full"?"#f0eeea":"transparent",color:chatContextMode==="full"?"#1a1815":"#a09a93",transition:"all 0.15s"}}>Full Book</button>
                <span style={{fontSize:"10px",color:"#c4bfb8",fontFamily:"'DM Sans', sans-serif",marginLeft:"4px"}}>{chatContextMode==="full"?"Gemini can see the entire book":"Gemini sees hook + caption + context + excerpt"}</span>
              </div>

              {/* Messages */}
              <div style={{flex:1,overflowY:"auto",padding:"14px 24px",display:"flex",flexDirection:"column",gap:"10px"}}>
                {chatMessages.length===0&&!chatLoading&&(
                  <div style={{textAlign:"center",padding:"40px 20px",color:"#c4bfb8"}}>
                    <div style={{fontSize:"11px",fontFamily:"'DM Sans', sans-serif",marginBottom:"8px"}}>Ask anything about the scene, book, or excerpt</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"6px",justifyContent:"center"}}>
                      {["What happens right before this scene?","Is there a better line from him in this chapter?","What's the emotional context here?","Find me a more intense version of this moment"].map(q=>(
                        <button key={q} onClick={()=>{setChatInput(q);setTimeout(()=>chatInputRef.current?.focus(),50)}} style={{padding:"5px 10px",fontSize:"10px",borderRadius:"12px",border:"1px solid #e8e6e1",backgroundColor:"#fff",color:"#a09a93",cursor:"pointer",fontFamily:UI_FONT,transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#e85d3a';e.currentTarget.style.color='#e85d3a'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#e8e6e1';e.currentTarget.style.color='#a09a93'}}>{q}</button>
                      ))}
                    </div>
                  </div>
                )}
                {chatMessages.map((m,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:"8px"}}>
                    <div style={{maxWidth:"75%",padding:"10px 14px",borderRadius:m.role==="user"?"12px 12px 2px 12px":"12px 12px 12px 2px",backgroundColor:m.role==="user"?"#e85d3a":"#fff",border:`1px solid ${m.isError?"#f5c6cb":m.role==="user"?"#e85d3a":"#e8e6e1"}`,color:m.isError?"#dc3545":m.role==="user"?"#fff":"#1a1815",fontSize:"13px",lineHeight:"1.5",fontFamily:UI_FONT,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                      {m.text}
                    </div>
                  </div>
                ))}
                {chatLoading&&(
                  <div style={{display:"flex",justifyContent:"flex-start"}}>
                    <div style={{padding:"10px 14px",borderRadius:"12px 12px 12px 2px",backgroundColor:"#f0eeea",border:"1px solid #e8e6e1"}}>
                      <span style={{display:"inline-flex",gap:"4px",alignItems:"center"}}>
                        <span style={{width:"6px",height:"6px",borderRadius:"50%",backgroundColor:"#e85d3a",animation:"spin 1s linear infinite"}} />
                        <span style={{fontSize:"12px",color:"#a09a93",fontFamily:"'DM Sans', sans-serif"}}>Thinking...</span>
                      </span>
                    </div>
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>

              {/* Input */}
              <div style={{padding:"10px 24px 14px",borderTop:"1px solid #f0eeea",display:"flex",gap:"8px",flexShrink:0}}>
                <input ref={chatInputRef} value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat()}}} placeholder={apiKey?"Ask about this scene...":"Enter your API key on the Generate tab first"} disabled={!apiKey.trim()} style={{...ST.input,flex:1,fontSize:"13px",padding:"10px 14px",backgroundColor:"#fff",borderColor:"#e8e6e1"}} />
                <button onClick={sendChat} disabled={chatLoading||!chatInput.trim()||!apiKey.trim()} style={{...ST.btn,padding:"10px 20px",backgroundColor:chatLoading||!chatInput.trim()||!apiKey.trim()?"#f0eeea":"#e85d3a",color:chatLoading||!chatInput.trim()||!apiKey.trim()?"#a09a93":"#fff",fontSize:"13px",whiteSpace:"nowrap"}}>Send</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BookTokApp />);
  </script>
</body>
</html>
